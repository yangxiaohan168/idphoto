# 复制本文件为 config.yml 后按需修改，再运行 ./deploy.sh
#
# —— 场景 A：本机已有 Docker 反代（Nginx / Traefik / npm 等）并已用 Let's Encrypt 占用了 80/443 ——
#   设 enable_ssl: false，只启动证件照容器；http_port 选一个未被占用的端口（如 7860）。
#   bind_host: 127.0.0.1 表示只监听本机回环，由宿主机上的反代转发到 http://127.0.0.1:http_port
#   在现有反代里为该域名配置 upstream（勿再为本项目单独申请证书，继续用原反代的 HTTPS 即可）。
#
# —— 场景 B：本机没有反代，希望本项目自带 Caddy + Let's Encrypt ——
#   enable_ssl: true，domain / acme_email 填真实值，80/443 需空闲（或改 caddy_*_port 并处理校验端口）。
#
# domain / acme_email: 仅 enable_ssl: true（内置 Caddy）时用于证书；走场景 A 时仍可保留作备注
# image / tag: Docker 镜像与标签
# http_port: 场景 A 为宿主机映射端口；场景 B 在 enable_ssl 为 true 时不用浏览器直连该端口
# bind_host: 可选；填 127.0.0.1 时端口只绑定回环（推荐场景 A）；不写则监听所有网卡
# caddy_http_port / caddy_https_port: 仅 enable_ssl: true 时生效

domain: "idphoto.example.com"
acme_email: "you@example.com"
image: "linzeyi/hivision_idphotos"
tag: "v1.3.1"
enable_ssl: false
http_port: 7860
bind_host: "127.0.0.1"
caddy_http_port: 80
caddy_https_port: 443
